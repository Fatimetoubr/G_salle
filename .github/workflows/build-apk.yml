name: Build Flutter APK

on:
  push:
    branches: [ main ]
    paths:
      - 'supsalle_flutter2/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:   # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supsalle_flutter2

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Recuperer les dependances
        run: flutter pub get

      - name: Construire l'APK (release)
        run: flutter build apk --release

      - name: Publier l'APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: supsalle-apk
          path: supsalle_flutter2/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
