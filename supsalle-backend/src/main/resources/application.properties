# ===== Application =====
spring.application.name=supsalle-backend
server.port=8080

# ===== Base de donnees MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/supsalle_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=supsalle_secret_key_minimum_32_characters_long_for_hs256
jwt.expiration=86400000

# ===== Desactiver autoconfigure mail =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ===== Logging =====
logging.level.com.supsalle=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
