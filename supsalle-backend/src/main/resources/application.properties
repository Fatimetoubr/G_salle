# ===== Application =====
spring.application.name=supsalle-backend
server.port=${PORT:8080}

# ===== Base de donnees MySQL =====
# En local : valeurs par defaut ci-dessous. En production (Render) : definies via variables d'environnement.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/supsalle_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=${JWT_SECRET:supsalle_secret_key_minimum_32_characters_long_for_hs256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== Desactiver autoconfigure mail =====
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ===== Logging =====
logging.level.com.supsalle=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
